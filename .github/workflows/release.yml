name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve dependencies
        run: swift package resolve

      - name: Download Mihomo runtime
        run: ./script/bootstrap.sh

      - name: Build signed update assets
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          chmod +x script/build_and_run.sh script/package_release.sh
          ./script/package_release.sh "$version"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          cat > dist/release-notes.md <<EOF
          ## Clash Glass $version

          - Native macOS client powered by Mihomo
          - Signed Sparkle update feed and DMG download
          - Preferences and managed profiles remain outside the app bundle

          ### Installation

          This community build is distributed without Apple Developer ID
          notarization. If macOS blocks the first launch, Control-click the app,
          choose **Open**, and confirm. Sparkle updates are independently
          protected with an EdDSA signature.
          EOF
          gh release create "$GITHUB_REF_NAME" \
            "dist/ClashGlass-$version.dmg" \
            "dist/appcast.xml" \
            --title "Clash Glass $version" \
            --notes-file "dist/release-notes.md"
